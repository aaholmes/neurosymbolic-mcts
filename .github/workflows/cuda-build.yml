name: CUDA Build (compile-only)

# The GPU MCTS / transformer code lives in cuda/ and requires an NVIDIA GPU to
# *run*. GitHub-hosted runners have no GPU, so the CUDA test suite cannot be
# executed in CI (see cuda/README.md for how to run it locally). This job only
# verifies that the CUDA sources still *compile* with nvcc — it never launches a
# kernel, so it is safe on a GPU-less runner.

on:
  push:
    branches: [ "main" ]
    paths: [ "cuda/**", ".github/workflows/cuda-build.yml" ]
  pull_request:
    branches: [ "main" ]
    paths: [ "cuda/**", ".github/workflows/cuda-build.yml" ]

jobs:
  compile:
    name: nvcc compile (no test execution)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install CUDA toolkit (nvcc only)
      uses: Jimver/cuda-toolkit@v0.2.19
      with:
        cuda: '12.5.0'
        method: 'network'
        # Headers + nvcc are enough to compile; we never run a kernel.
        sub-packages: '["nvcc", "cudart"]'

    - name: Show nvcc version
      run: nvcc --version

    - name: Configure (CMake)
      working-directory: cuda
      # No physical GPU on the runner, so target a fixed virtual architecture.
      run: cmake -S . -B build -DCMAKE_CUDA_ARCHITECTURES=89

    - name: Build (compile-only, no tests run)
      working-directory: cuda
      run: cmake --build build -j

    # NOTE: deliberately no test execution step. The CUDA tests require a GPU
    # and would fail to launch on a GitHub-hosted runner. Run them locally per
    # cuda/README.md.
